<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="100%" height="auto">
  <defs>
    <style>
      .win { fill: #0d1117; stroke: #30363d; stroke-width: 1.5; }
      .bar { fill: #161b22; }
      .path { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #8b949e; }
      .prompt { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #39d353; }
      .cmd { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #e6edf3; }
      .out { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #f5a742; }
      .cursor { fill: #39d353; }
    </style>
    <linearGradient id="scrGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
  </defs>

  <rect x="20" y="10" width="860" height="118" rx="10" class="win" fill="url(#scrGrad2)"/>
  <rect x="20" y="10" width="860" height="30" rx="10" class="bar"/>
  <rect x="20" y="28" width="860" height="12" class="bar"/>
  <circle cx="42" cy="25" r="5.5" fill="#ff5f56"/>
  <circle cx="60" cy="25" r="5.5" fill="#ffbd2e"/>
  <circle cx="78" cy="25" r="5.5" fill="#27c93f"/>
  <text x="450" y="29" text-anchor="middle" class="path">shubham@github ~ /portfolio</text>

  <text x="42" y="72" class="cmd">
    <tspan class="prompt">shubham@github</tspan><tspan fill="#8b949e">:~$ </tspan>logout
  </text>
  <text x="42" y="100" class="out">
    &gt; Connection to github.com closed. Thanks for stopping by — let's build something.
  </text>
  <rect x="52" y="106" width="8" height="14" class="cursor">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
