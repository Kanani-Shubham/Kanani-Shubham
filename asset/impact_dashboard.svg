<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" height="auto">
  <defs>
    <style>
      .panel { fill: #0d1117; stroke: #30363d; stroke-width: 1.3; }
      .lbl { font-family: 'Courier New', Consolas, monospace; font-size: 12.5px; fill: #8b949e; }
      .big { font-family: 'Courier New', Consolas, monospace; font-weight: bold; }
      .sub { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #6e7681; }
      .ring-bg { fill: none; stroke: #21262d; stroke-width: 9; }
      .ring-fg { fill: none; stroke: #39d353; stroke-width: 9; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="220" fill="none"/>

  <!-- Panel 1: score ring -->
  <rect x="10" y="10" width="210" height="200" rx="10" class="panel"/>
  <text x="115" y="34" text-anchor="middle" class="lbl">$ ./score --event hack2skill</text>
  <g transform="translate(115,110)">
    <circle r="52" class="ring-bg"/>
    <circle r="52" class="ring-fg" stroke-dasharray="326.73" stroke-dashoffset="326.73" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" from="326.73" to="12.45" dur="1.6s" begin="0.3s" fill="freeze"/>
    </circle>
    <text x="0" y="6" text-anchor="middle" class="big" font-size="26" fill="#39d353">96.19</text>
    <text x="0" y="24" text-anchor="middle" class="sub">/ 100</text>
  </g>
  <text x="115" y="196" text-anchor="middle" class="sub">PromptWars 2026 Score</text>

  <!-- Panel 2: rank -->
  <rect x="230" y="10" width="210" height="200" rx="10" class="panel"/>
  <text x="335" y="34" text-anchor="middle" class="lbl">$ ./rank --leaderboard</text>
  <text x="335" y="108" text-anchor="middle" class="big" font-size="34" fill="#c9a8ff">#161</text>
  <text x="335" y="132" text-anchor="middle" class="sub">of 37,783 participants</text>
  <text x="335" y="168" text-anchor="middle" class="big" font-size="20" fill="#c9a8ff">Top 0.43%</text>
  <text x="335" y="190" text-anchor="middle" class="sub">nationwide</text>

  <!-- Panel 3: projects -->
  <rect x="450" y="10" width="210" height="200" rx="10" class="panel"/>
  <text x="555" y="34" text-anchor="middle" class="lbl">$ ls ~/projects | wc -l</text>
  <text x="555" y="120" text-anchor="middle" class="big" font-size="46" fill="#f5a742">15+</text>
  <text x="555" y="150" text-anchor="middle" class="sub">shipped end-to-end</text>
  <text x="555" y="175" text-anchor="middle" class="sub">AI · Full-Stack · Mobile</text>

  <!-- Panel 4: hackathons + internships -->
  <rect x="670" y="10" width="220" height="200" rx="10" class="panel"/>
  <text x="780" y="34" text-anchor="middle" class="lbl">$ ./history --all</text>
  <text x="700" y="80" class="lbl" fill="#e6edf3">Hackathons</text>
  <text x="880" y="80" text-anchor="end" class="big" font-size="18" fill="#58a6ff">4</text>
  <text x="700" y="112" class="lbl" fill="#e6edf3">Internships</text>
  <text x="880" y="112" text-anchor="end" class="big" font-size="18" fill="#58a6ff">2</text>
  <text x="700" y="144" class="lbl" fill="#e6edf3">Certifications</text>
  <text x="880" y="144" text-anchor="end" class="big" font-size="18" fill="#58a6ff">12</text>
  <text x="700" y="176" class="lbl" fill="#e6edf3">Languages spoken</text>
  <text x="880" y="176" text-anchor="end" class="big" font-size="18" fill="#58a6ff">3</text>
</svg>